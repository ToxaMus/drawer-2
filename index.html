<html>

<head>
    <script src="scene.js"></script>
    <script src="shape.js"></script>
    <script src="circle.js"></script>
    <script src="point.js"></script>
    <script src="rubber.js"></script>
    <script src="tetrahedron.js"></script>
</head>

<body>
    <canvas id="canvas" width="600" height="600" style="border: 1px solid grey"></canvas>
</body>


<script>
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");
    const scene = new Scene(context);

    const tetrahedron = new Tetrahedron([
        new Point('A', 200, 400),
        new Point('C', 300, 150),
        new Point('B', 400, 400), 
        new Point('D', 300, 550),
    ]);
    scene.addShape(tetrahedron)
    scene.draw()

</script>

</html>
