<html>

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="main.css">
    <script src="scene.js"></script>
    <script src="broken line.js"></script>
    <script src="circle.js"></script>
    <script src="point.js"></script>
    <script src="rubber.js"></script>
    <script src="tetrahedron.js"></script>
    <script src="triangle.js"></script>
    <script src="rulerY.js"></script>
    <script src="rulerX.js"></script>
    <script src="coordinateTable.js"></script>
    <script src="inputPoint.js"></script>
</head>

<body>
    <div id="container">
        <canvas class="styleCanvas" id="rulerY" width="33" height="600"></canvas>
        <form id="drawer">
            <canvas id="canvas" class="styleCanvas" width="600" height="600"></canvas>
            <canvas id="coordinateTable" class="styleCanvas" width="600" height="600"></canvas>
        </form>
        <div id="text">
            <div> Геометрическая фигура:
                <select id="geometryType">
                    <option></option>
                    <option value="line">ломаная</option>
                    <option value="circle">круг</option>
                    <option value="tetrahedron">тетраэдр</option>
                    <option value="triangle">треугольник</option>
                    <option value="rhombus">ромб</option>
                    <option value="rubber">резинка</option>
                </select>
            </div>
            <form id="input"></form>
        </div>
    </div>

    <canvas class="styleCanvas" id="rulerX" width="600" height="33"></canvas>
</body>


<script>
    const rulerY = new RulerY()
    rulerY.draw()

    const rulerX = new RulerX()
    rulerX.draw()

    const coordinateTable = new CoordinateTable()
    coordinateTable.draw()

    const geometryTypeElement = document.getElementById("geometryType");

    let geometryType
    geometryTypeElement.addEventListener('change', (event) => {
        geometryType = geometryTypeElement.value;

        const inputPoint = new InputPoint(geometryType)
        inputPoint.removeInput()
        inputPoint.choosingFigure()
    })

</script>
